apiVersion: apps/v1
kind: Deployment
metadata:
  name: department-service
  namespace: microservices

spec:
  replicas: 1

  selector:
    matchLabels:
      app: department-service

  template:
    metadata:
      labels:
        app: department-service

    spec:
      containers:
        - name: department-service
          image: department-service:1.0
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 8082

          env:
            - name: SERVER_PORT
              value: "8082"

            - name: SPRING_APPLICATION_NAME
              value: "DEPARTMENT-SERVICE"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-db:3306/departmentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"

            - name: SPRING_DATASOURCE_USERNAME
              value: "root"

            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"

            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"

            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "true"

            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "true"

            - name: EUREKA_INSTANCE_HOSTNAME
              value: "department-service"

            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"

            - name: EUREKA_INSTANCE_INSTANCE_ID
              value: "department-service:8082"

            - name: SPRING_CLOUD_OPENFEIGN_CIRCUITBREAKER_ENABLED
              value: "true"

          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: department-service
  namespace: microservices

spec:
  selector:
    app: department-service

  ports:
    - name: http
      port: 8082
      targetPort: 8082

  type: ClusterIP
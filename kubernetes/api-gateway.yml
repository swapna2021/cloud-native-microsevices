apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: microservices

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway
          image: swapnamotupally/api-gateway:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8090

          env:
            - name: SERVER_PORT
              value: "8090"

            - name: SPRING_APPLICATION_NAME
              value: "API-GATEWAY"

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"

            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "true"

            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "true"

            - name: EUREKA_INSTANCE_HOSTNAME
              value: "api-gateway.microservices.svc.cluster.local"

            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"

            - name: EUREKA_INSTANCE_INSTANCE_ID
              value: "api-gateway:8090"

          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: microservices

spec:
  selector:
    app: api-gateway

  ports:
    - name: http
      port: 8090
      targetPort: 8090
      nodePort: 30090

  type: NodePort
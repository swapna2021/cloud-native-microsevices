apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: microservices

spec:
  replicas: 1

  selector:
    matchLabels:
      app: eureka-server

  template:
    metadata:
      labels:
        app: eureka-server

    spec:
      containers:
      - name: eureka-server

        image: eureka-server:1.0
        imagePullPolicy: Never

        ports:
        - containerPort: 8761

        env:
        - name: SERVER_PORT
          value: "8761"

        - name: EUREKA_INSTANCE_HOSTNAME
          value: "eureka-server"

---
apiVersion: v1
kind: Service

metadata:
  name: eureka-server
  namespace: microservices

spec:
  selector:
    app: eureka-server

  ports:
  - port: 8761
    targetPort: 8761

  type: NodePort